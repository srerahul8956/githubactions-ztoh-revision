#this is name of the workflow that will be displayed in the actions tab
name: CICD

# should run manually, on manual click (delvier) workflow whenever user needs
on: 
 workflow_dispatch:
  inputs:
    environment:
     description: Select the environment where this workflow runs
     default: 'dev'
     required: true
     type: choice
     options:
       - dev
       - prod
       - staging
       

jobs:
    code:
     runs-on: ubuntu-latest
     steps:
       - name: checkout code
         run: echo "code clone from GitHub"
    
    build:
     needs: code
     runs-on: ubuntu-latest    
     steps:
       - name: build docker container
         run: echo "docker container build"
              
    test:
     needs: [code,build]
     runs-on: ubuntu-latest
     steps:
       - name: Test the container 
         run: echo "Testing the Container background"

    deploy:
     if: inputs.environment == 'dev' 
     needs: [build,test]
     runs-on: ubuntu-latest
     steps:
         - name: Deploying the app
           run: echo "Docker compose deployed the app"

           
      
     
  
  

