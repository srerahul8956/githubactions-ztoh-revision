<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Zero To Hero</title>
<style>
body{
    margin:0;
    display:grid;
    place-items:center;
    min-height:100vh;
    font-family:Arial,sans-serif;
    background:#1e293b;
    color:#fff;
}
.box{text-align:center}
h1{margin-bottom:.5rem}
.badge{color:#38bdf8;margin-bottom:2rem}
.pipeline{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}
.step{
    padding:.6rem 1rem;
    border:1px solid #38bdf8;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="box">
    <h1>DevOps Zero To Hero</h1>
    <p class="badge">Josh Batch 10 IND Edition</p>

    <div class="pipeline">
        <div class="step">🏗️ Build</div>
        <div class="step">✅ Lint</div>
        <div class="step">🚀 Deploy (AWS ECS)</div>
    </div>

    <p style="margin-top:20px;font-size:.9rem;color:#94a3b8;">
        Automated with GitHub Actions by Rahul
    </p>
</div>

</body>
</html>
